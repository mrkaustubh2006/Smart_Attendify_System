{% extends "shared/base.html" %}
{% block title %}Classes{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2"><i class="fas fa-door-open text-primary"></i> Classes</h1>
    <a href="{{ url_for('admin.add_class') }}" class="btn btn-primary"><i class="fas fa-plus"></i> Add Class</a>
  </div>
  <div class="card shadow">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>Class Name</th><th>Department</th><th>Academic Year</th></tr>
        </thead>
        <tbody>
          {% for c in classes %}
          <tr>
            <td><strong>{{ c.class_name }}</strong></td>
            <td>{{ c.department }}</td>
            <td>{{ c.academic_year or '—' }}</td>
          </tr>
          {% else %}
          <tr><td colspan="3" class="text-center text-muted py-4">No classes found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
